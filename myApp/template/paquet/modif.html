<!DOCTYPE html>
<html lang="fr">

{% include "layout/header.html" %}

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/modif_paquet.css') }}">

<body>

{% include "layout/nav.html" %}

<header id="head" class="secondary"></header>

<div class="container">

    <div class="edit-container">

        <h1 class="title">
            Modifier le paquet
        </h1>

        <form method="POST">

            <!-- NOM DU PAQUET -->
            <div class="form-group">

                <label>Nom du paquet</label>

                <input type="text"
                       name="nom_paquet"
                       value="{{ paquet.nompaquet }}"
                       class="form-control input-edit"
                       required>

            </div>

            
            <br>
            
            <div class="form-group">
                <label>Catégorie associée au paquet</label>
                <select name="categorie" class="form-control">
                {%for categorie in categories%}
                <option value={{categorie.idcategorie}}>{{categorie.nomcategorie}}</option>
                {%endfor%}
                </select>
            </div>
            
            <br>

            <!-- VISIBILITE DU PAQUET-->
            <div class="form-group">

                <label style="font-weight:bold; font-size:16px;">
                    Visibilité
                </label>

                <div style="margin-top:10px;">

                    <label style="cursor:pointer; font-size:15px;">
                        <input type="checkbox"
                               name="public"
                               {% if paquet.public == 1 %}checked{% endif %}>
                        Paquet public
                    </label>

                </div>

                <small style="color:#777;">
                    Si la case est décochée, le paquet sera privé
                </small>

            </div>

            <br>

            <!-- BOUTON ENREGISTREMENT MODIFICATION -->
            <button class="btn-save" type="submit">

                <img src="/static/images/diskette.png"
                    alt="Enregistrer"
                    class="icon-save">

                Enregistrer

            </button>

        </form>

    </div>

</div>

</body>
</html>
