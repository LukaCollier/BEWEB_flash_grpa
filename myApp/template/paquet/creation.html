<!DOCTYPE html>
<html lang="fr">

{% include "layout/header.html" %}

<body>

{% include "layout/nav.html" %}

<header id="head" class="secondary"></header>

<link rel="stylesheet"
      href="{{ url_for('static', filename='css/paquet.css') }}">

<div class="container">

    <ol class="breadcrumb">
        <li><a href="/">Accueil</a></li>
        <li class="active">Création paquet</li>
    </ol>

    <div class="form-container">

        <h1 class="page-title">
            Créer un paquet
        </h1>

        <form method="POST">

            <!-- NOM DU NOUVEAU PAQUET -->
            <div class="form-group">

                <label>Nom du paquet</label>

                <input type="text"
                       name="nom_paquet"
                       class="form-control"
                       placeholder="Ex: Algèbre"
                       required>

            </div>

            <br>
            
            <div class="form-group">
                <label>Catégorie associée au paquet</label>
                <select name="categorie" class="form-control">
                {%for categorie in categories%}
                <option value={{categorie.idcategorie}}>{{categorie.nomcategorie}}</option>
                {%endfor%}
                </select>
            </div>

            <br>

            <!-- CHOISIR LA VISIBILITE DU NOUVEAU PAQUET  -->
            <div class="form-group">

                <label style="font-weight:bold;">
                    Visibilité du paquet
                </label>

                <div style="margin-top:10px;">

                    <label style="cursor:pointer; font-size:16px;">
                        <input type="checkbox" name="public">
                        Paquet public
                    </label>

                </div>

                <small style="color:#777;">
                    Si case décochée, paquet privé (visible par vous uniquement)
                </small>

            </div>

            <br>

            <!-- BOUTON -->
            <button type="submit"
                    class="btn btn-primary btn-block">

                Créer le paquet

            </button>

        </form>

    </div>

</div>

{% include "layout/footer.html" %}

</body>
</html>
